    <!-- Google tag (gtag.js) — deferred load -->
    <script>
      // Set up dataLayer + gtag stub IMMEDIATELY so trackEvent() calls
      // anywhere in the app buffer into dataLayer with zero loss.
      // Then defer the 164 KB gtag.js download until first user
      // interaction or 3s idle, whichever fires first. When gtag.js
      // arrives it drains the queue, so no events are dropped.
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () { window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', 'G-LJ6XE6JK2L', { send_page_view: false });

      (function () {
        var loaded = false;
        function loadGtag() {
          if (loaded) return;
          loaded = true;
          ['scroll', 'keydown', 'mousemove', 'touchstart', 'click'].forEach(function (t) {
            window.removeEventListener(t, loadGtag, true);
          });
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-LJ6XE6JK2L';
          document.head.appendChild(s);
        }
        ['scroll', 'keydown', 'mousemove', 'touchstart', 'click'].forEach(function (t) {
          window.addEventListener(t, loadGtag, { capture: true, passive: true, once: true });
        });
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadGtag, { timeout: 3000 });
        } else {
          setTimeout(loadGtag, 3000);
        }
      })();
    </script>
